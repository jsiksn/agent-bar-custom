  <text x="310" y="271" fill="#FFA24B" font-size="18" font-weight="800" font-family="SF Pro Display, Arial, sans-serif">60%</text>
  <rect x="30" y="286" width="290" height="8" rx="4" fill="#AAA0A8"/>
  <rect x="30" y="286" width="186" height="8" rx="4" fill="#FF9A45"/>
